version: "2"
linters:
  default: standard
  enable:
    - testifylint
    - gosec
    - importas
    - modernize
    - loggercheck
    - sloglint
    - canonicalheader
    - gocritic
    - cyclop
    - revive
    - ineffassign
    - nilnesserr
    - unused
    - thelper
    - errorlint
    - usestdlibvars
    - misspell
  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
    warn-unused: true
  settings:
    revive:
      rules:
        - name: dot-imports
          arguments:
            - allowed-packages: [
                  # testing packages used with dot imports for more readable tests
                  "github.com/onsi/ginkgo/v2",
                  "github.com/onsi/gomega",
                ]
    unused:
      field-writes-are-uses: false
      exported-fields-are-used: false
    gocritic:
      enable-all: true
      disabled-checks:
        - paramTypeCombine # I find it more clear to have explicit types in parameters
    gosec:
      excludes:
        # disabled currently I interpret them more as false positive
        - G704
        - G705
        - G706
formatters:
  enable:
    - gofumpt
    - golines
  settings:
    golines:
      max-len: 120
